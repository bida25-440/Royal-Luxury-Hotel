<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rooms</title>
  <link rel="stylesheet" href="style.css">
<body>

    <header>
        <h1>Rooms</h1>
    </header> 

<nav>
         <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="rooms.html">Rooms</a>
        <a href="booking.html">Booking</a>
        <a href="facilities.html">Facilities</a>
        <a href="gallery.html">Gallery</a></li>
        <a href="contact.html">Contact</a>
        <a href="reviews.html">Reviews</a>
        <a href="specialoffers.html">Offers</a>
      
</nav>

<main class="container">
  <div class="row">

    <!-- Standard Room -->
    <div class="card">
      <img src="standardroom pic1.jpg" alt="Standard Room" class="room-img" onclick="openGallery('standard')">
      <h3>Standard Room</h3>
      <p>Price: $150/night</p>
      <a href="booking.html"><button class="btn">Book Now</button></a>
    </div>

    <!-- Deluxe Room -->
    <div class="card">
      <img src="deluxeroom pic1.jpg" alt="Deluxe Room" class="room-img" onclick="openGallery('deluxe')">
      <h3>Deluxe Room</h3>
      <p>Price: $200/night</p>
      <a href="booking.html"><button class="btn">Book Now</button></a>
    </div>

     <div class="card">
      <img src="Familyroom pic1.jpeg" alt="Family Room" class="room-img" onclick="openGallery('Family')">
      <h3>Family Room</h3>
      <p>Price: $200/night</p>
      <a href="booking.html"><button class="btn">Book Now</button></a>
    </div>

     <div class="card">
      <img src="deluxe-room.jpg" alt="Excutive Room" class="room-img" onclick="openGallery('Excutive')">
      <h3>Excutive Room</h3>
      <p>Price: $200/night</p>
      <a href="booking.html"><button class="btn">Book Now</button></a>
    </div>

     <div class="card">
      <img src="deluxe-room.jpg" alt="Presidential Suite" class="room-img" onclick="openGallery('Presidential')">
      <h3>Presidential Suite</h3>
      <p>Price: $200/night</p>
      <a href="booking.html"><button class="btn">Book Now</button></a>
    </div>


  </div>
</main>

<!-- Modal (Popup Gallery) -->
<div id="galleryModal" class="modal">
  <span class="close" onclick="closeGallery()">&times;</span>
  <div id="galleryContent"></div>
</div>

<script>
function openGallery(roomType) {
  var modal = document.getElementById("galleryModal");
  var content = document.getElementById("galleryContent");

  content.innerHTML = ""; // clear previous images

  if (roomType === "standard") {
    content.innerHTML = `
      <img src="standardroom pic2.jpg">
      <img src="standardroom pic3.jpg">
      <img src="standardroom pic4.jpg">
    `;
  }

  if (roomType === "deluxe") {
    content.innerHTML = `
      <img src="deluxeroom pic2.jpg">
      <img src="deluxeroom pic3.jpeg">
      <img src="deluxeroom pic4.jpeg">
    `;
  }

    if (roomType === "Family") {
    content.innerHTML = `
      <img src="Familyroom pic2.jpeg">
      <img src="Familyroom pic3.jpeg">
      <img src="Familyroom pic4.jpeg">
    `;
  }

    if (roomType === "Excutive") {
    content.innerHTML = `
      <img src="deluxe1.jpg">
      <img src="deluxe2.jpg">
      <img src="deluxe3.jpg">
    `;
  }

    if (roomType === "Presidential") {
    content.innerHTML = `
      <img src="deluxe1.jpg">
      <img src="deluxe2.jpg">
      <img src="deluxe3.jpg">
    `;
  }

  modal.style.display = "block";
}

function closeGallery() {
  document.getElementById("galleryModal").style.display = "none";
}
</script>
</body>
</html>
